id: gemini-cli
version: "1.0.0"
description: "Gemini CLI (Google) — auth via GEMINI_API_KEY au runtime"
options:
  version:
    type: string
    default: "latest"
    description: "Version npm (@google/gemini-cli)"
requires_secrets:
  - path: "llm/gemini_key"
    env: "GEMINI_API_KEY"
installs_after:
  - node
