services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    # POSTGRES_USER / POSTGRES_PASSWORD lus depuis /data/.env (pas de substitution YAML)
    env_file: /data/.env
    environment:
      # Base fixe — pas un secret, pas besoin d'être dans .env
      POSTGRES_DB: portal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # PROD : port 5432 NON publié sur l'hôte — accès uniquement via le réseau `internal`.
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portal}"]
      interval: 10s
      timeout: 5s
      retries: 5

  portal:
    build:
      # Contexte = racine du repo (deploy/prod/ → ../..)
      context: ../..
      dockerfile: deploy/Dockerfile
    image: workspace-portal:prod
    restart: unless-stopped
    env_file: /data/.env
    volumes:
      - /data:/data
      - /data/.devpod:/root/.devpod
    # PROD : plage workspace 40000-40019 NON publiée — tout transite par Caddy + OIDC (§F-33).
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    build:
      # Caddy avec plugin DNS Cloudflare (xcaddy) pour le wildcard TLS DNS-01 (§F-30)
      context: ../..
      dockerfile: deploy/Dockerfile.caddy
    image: workspace-caddy:prod
    restart: unless-stopped
    env_file: /data/.env
    volumes:
      # Caddyfile.prod : TLS DNS-01 Cloudflare sur {$BASE_DOMAIN}.
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      # Données ACME (certificats) — persistées dans un volume nommé, distinct du /data du portail.
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - portal
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
