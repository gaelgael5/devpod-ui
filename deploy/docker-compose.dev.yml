services:
  portal:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: workspace-portal:dev
    restart: unless-stopped
    env_file: /data/.env
    ports:
      - "80:8080"
    volumes:
      - /data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
