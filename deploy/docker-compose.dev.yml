services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    # POSTGRES_USER et POSTGRES_PASSWORD lus depuis /data/.env (pas de substitution YAML)
    env_file: /data/.env
    environment:
      # Base fixe — pas un secret, pas besoin d'être dans .env
      POSTGRES_DB: portal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d portal"]
      interval: 10s
      timeout: 5s
      retries: 5

  portal:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: workspace-portal:dev
    restart: unless-stopped
    env_file: /data/.env
    environment:
      # Accès HTTP direct (sans TLS) en dev : désactive le flag Secure sur les
      # cookies de session, sans quoi le navigateur ne les renvoie jamais.
      DEV_MODE: "true"
    volumes:
      - /data:/data
    ports:
      # Accès direct au portail en dev (bypass Caddy) — smoke test + debug
      - "8080:8080"
      # Plage de ports du tunnel SSH workspace
      - "40000-40019:40000-40019"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2
    restart: unless-stopped
    env_file: /data/.env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      # CADDY_DEV_PORT=80 par défaut. Sur une machine où le port 80 est déjà pris
      # (ex. Caddy de prod), définir CADDY_DEV_PORT=8090 dans /data/.env.
      - "${CADDY_DEV_PORT:-80}:80"
    networks:
      - internal

  loki:
    image: grafana/loki:3.3.2
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - ./loki-config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/var/loki
    ports:
      # Port publié sur le host pour recevoir les push des collecteurs distants.
      - "3100:3100"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    env_file: /data/.env
    environment:
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: postgres:5432
      GF_DATABASE_NAME: grafana
      GF_DATABASE_USER: ${POSTGRES_USER}
      GF_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: Keycloak
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: grafana
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: ${GF_OAUTH_CLIENT_SECRET:-}
      GF_AUTH_GENERIC_OAUTH_SCOPES: openid email profile
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: ${GF_OAUTH_AUTH_URL:-}
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: ${GF_OAUTH_TOKEN_URL:-}
      GF_AUTH_GENERIC_OAUTH_API_URL: ${GF_OAUTH_API_URL:-}
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:-http://localhost:3000}
    volumes:
      - ./grafana-provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      postgres:
        condition: service_healthy
      loki:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  internal:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  loki_data:
  grafana_data:
