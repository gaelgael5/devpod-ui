services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    # POSTGRES_USER et POSTGRES_PASSWORD lus depuis /data/.env (pas de substitution YAML)
    env_file: /data/.env
    environment:
      # Base fixe — pas un secret, pas besoin d'être dans .env
      POSTGRES_DB: portal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portal}"]
      interval: 10s
      timeout: 5s
      retries: 5

  portal:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: workspace-portal:dev
    restart: unless-stopped
    env_file: /data/.env
    volumes:
      - /data:/data
    ports:
      # Accès direct au portail en dev (bypass Caddy) — smoke test + debug
      - "8080:8080"
      # Plage de ports du tunnel SSH workspace
      - "40000-40019:40000-40019"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2
    restart: unless-stopped
    env_file: /data/.env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      # CADDY_DEV_PORT=80 par défaut. Sur une machine où le port 80 est déjà pris
      # (ex. Caddy de prod), définir CADDY_DEV_PORT=8090 dans /data/.env.
      - "${CADDY_DEV_PORT:-80}:80"
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
