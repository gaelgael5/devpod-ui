name: docker-build

# Build de validation des images Docker (portal + caddy).
# - dev / PR : build seul (push: false), gate avant de merger dev -> main.
# - main     : build + push sur GHCR (ghcr.io/<owner>/workspace-portal:main et
#              workspace-caddy:main). Ces images sont consommées par la livraison
#              prod (deploy/prod/prod-deploy.sh) — aucun code source sur la VM.
# Aucun secret build : le env_file /data/.env du compose est runtime (§D-21).

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

# Annule un run précédent encore en cours sur la même référence
concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Image du portail : context = racine du repo (COPY frontend/ backend/ scripts/)
          - name: portal
            context: .
            file: deploy/Dockerfile
          # Image Caddy + plugin DNS Cloudflare : context = deploy/
          - name: caddy
            context: deploy
            file: deploy/Dockerfile.caddy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login GHCR uniquement sur main (là où l'on pousse les images de prod).
      - name: Login GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          # Push seulement sur main ; dev/PR = build de validation.
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository_owner }}/workspace-${{ matrix.name }}:main
          # Cache GitHub Actions, isolé par image pour ne pas mélanger les layers
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
