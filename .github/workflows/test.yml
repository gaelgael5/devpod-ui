name: test

# Valide les tests du lot MCP gateway sur un runner doté de Docker.
# Les tests d'intégration backend utilisent testcontainers (PostgreSQL) — ils
# skippent là où Docker est absent (postes Windows de dev), d'où cette CI.
# Portée volontairement limitée aux modules MCP : la suite globale porte une
# dette de tests préexistante hors de ce lot (à étendre dans un chantier dédié).

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-mcp:
    name: backend MCP (ruff + mypy + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Ruff
        run: >-
          uv run ruff check
          src/portal/mcp/ src/portal/db/mcp.py src/portal/routes/mcp.py
          src/portal/secrets/resolver.py
          tests/mcp/ tests/db/test_mcp.py tests/routes/test_mcp_routes.py
          tests/secrets/test_resolver_protocol.py

      - name: Mypy
        run: >-
          uv run mypy
          src/portal/mcp/ src/portal/db/mcp.py src/portal/routes/mcp.py
          src/portal/secrets/resolver.py

      - name: Pytest (testcontainers via le Docker du runner)
        run: >-
          uv run pytest -v
          tests/mcp/ tests/db/test_mcp.py tests/routes/test_mcp_routes.py
          tests/secrets/test_resolver_protocol.py

  frontend-mcp:
    name: frontend MCP (tsc + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Vitest
        run: npx vitest run src/features/mcp/
