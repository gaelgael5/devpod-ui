name: Python Dev
description: Python 3.12+ — IntelliSense, Ruff (lint+format), debugpy, mypy
extensions:
  - ms-python.python
  - ms-python.debugpy
  - charliermarsh.ruff
  - ms-python.mypy-type-stubs
  - ms-python.pylint
settings:
  editor.formatOnSave: true
  editor.defaultFormatter: charliermarsh.ruff
  "[python]":
    editor.defaultFormatter: charliermarsh.ruff
  ruff.organizeImports: true
  python.defaultInterpreterPath: /usr/bin/python3
